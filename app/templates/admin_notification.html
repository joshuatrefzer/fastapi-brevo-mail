<!DOCTYPE html>
<html>
<body style="margin:0; padding:0;  font-family:Arial, Helvetica, sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" >
    <tr>
        <td style="padding:25px 15px;">

            <table width="100%" cellpadding="0" cellspacing="0"
                   style="max-width:600px; margin:0 auto; border-radius:12px;">

                <!-- Header -->
                <tr>
                    <td style="padding:10px 5px; text-align:center;">
                        <h2 style="
                            margin:10px 0;
                            font-size:22px;
                            line-height:1.3;
                            text-align:left;
                        ">
                            Neue Gig-Anfrage
                        </h2>
                    </td>
                </tr>

                <!-- Inhalt -->
                <tr>
                    <td style="
                        padding:25px 20px;
                        font-size:16px;
                        line-height:1.5;
                    ">

                        <p style="margin-top:0;">
                            Eine neue Anfrage über die Musik - Website 🎉
                        </p>

                        <p style="margin-bottom:8px;">
                            <strong>Name</strong><br>
                            {{ name }}
                        </p>

                        <p style="margin-bottom:8px;">
                            <strong>Email</strong><br>
                            <a href="mailto:{{ email }}"
                               style="
                               text-decoration:none;
                               ">
                                {{ email }}
                            </a>
                        </p>

                        <p style="margin-bottom:0;">
                            <strong>Nachricht</strong><br>
                            {{ message }}
                        </p>

                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
